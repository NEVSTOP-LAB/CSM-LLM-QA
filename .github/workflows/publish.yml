# Publish csm-llm-qa packages:
# - Every push/workflow_dispatch: TestPyPI
# - v* tag push: PyPI
#
# Authentication uses Trusted Publisher (OIDC) — no API token needed.
# Before the first release, register this workflow as a Trusted Publisher on:
# 1) TestPyPI (project: csm-llm-qa)
#    Owner:       NEVSTOP-LAB
#    Repository:  CSM-LLM-QA
#    Workflow:    publish.yml
#    Environment: testpypi
# 2) PyPI (project: csm-llm-qa)
#    Owner:       NEVSTOP-LAB
#    Repository:  CSM-LLM-QA
#    Workflow:    publish.yml
#    Environment: pypi

name: Publish to PyPI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-testpypi:
    name: Build TestPyPI distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Set TestPyPI package version
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          pyproject_path = Path("pyproject.toml")
          content = pyproject_path.read_text(encoding="utf-8")
          base_version = tomllib.loads(content)["project"]["version"]
          if os.environ["GITHUB_REF"].startswith("refs/tags/v"):
              base_version = os.environ["GITHUB_REF_NAME"][1:]
          package_version = f"{base_version}.dev{os.environ['GITHUB_RUN_NUMBER']}"
          updated_content, replacements = re.subn(
              r'^version = "[^"]+"$',
              f'version = "{package_version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if replacements != 1:
              raise RuntimeError("Failed to update package version in pyproject.toml")
          pyproject_path.write_text(updated_content, encoding="utf-8")
          print(f"TestPyPI package version: {package_version}")
          PY

      - name: Build wheel and sdist
        run: python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions-testpypi
          path: dist/

  build-pypi:
    name: Build PyPI distribution
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Set PyPI package version from tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          package_version = os.environ["GITHUB_REF_NAME"][1:]
          pyproject_path = Path("pyproject.toml")
          content = pyproject_path.read_text(encoding="utf-8")
          updated_content, replacements = re.subn(
              r'^version = "[^"]+"$',
              f'version = "{package_version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if replacements != 1:
              raise RuntimeError("Failed to update package version in pyproject.toml")
          pyproject_path.write_text(updated_content, encoding="utf-8")
          print(f"PyPI package version: {package_version}")
          PY

      - name: Build wheel and sdist
        run: python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions-pypi
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/csm-llm-qa
    permissions:
      id-token: write  # required for OIDC Trusted Publisher

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4.1.3
        with:
          name: python-package-distributions-pypi
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build-testpypi
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/csm-llm-qa
    permissions:
      id-token: write  # required for OIDC Trusted Publisher

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4.1.3
        with:
          name: python-package-distributions-testpypi
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false
