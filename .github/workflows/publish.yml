# Publish csm-llm-qa packages:
# - Every push/workflow_dispatch: TestPyPI
# - v* tag push: PyPI
#
# Authentication uses Trusted Publisher (OIDC) — no API token needed.
# Before the first release, register this workflow as a Trusted Publisher on:
# 1) TestPyPI (project: csm-llm-qa)
#    Owner:       NEVSTOP-LAB
#    Repository:  CSM-LLM-QA
#    Workflow:    publish.yml
#    Environment: testpypi
# 2) PyPI (project: csm-llm-qa)
#    Owner:       NEVSTOP-LAB
#    Repository:  CSM-LLM-QA
#    Workflow:    publish.yml
#    Environment: pypi

name: Publish to PyPI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/csm-llm-qa
    permissions:
      id-token: write  # required for OIDC Trusted Publisher

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4.1.3
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/csm-llm-qa
    permissions:
      id-token: write  # required for OIDC Trusted Publisher

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4.1.3
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false
